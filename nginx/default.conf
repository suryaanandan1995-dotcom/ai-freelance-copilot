# Nginx reverse proxy → dashboard container (service "app" on :8000).
# HTTP on :80. For the public cal.com webhook you need HTTPS — see the TLS block
# below and DEPLOY.md § HTTPS.

upstream copilot_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Health endpoint for load balancers / uptime checks.
    location = /healthz {
        proxy_pass http://copilot_app;
    }

    # cal.com posts booking webhooks here — must reach the app with the raw body
    # intact (the app verifies the HMAC signature).
    location /webhooks/ {
        proxy_pass http://copilot_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
    }

    location / {
        proxy_pass http://copilot_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

