# Example Secret — DO NOT commit real values. Copy to secret.yaml, fill in, and
# apply separately (or manage with Sealed Secrets / External Secrets / Vault).
apiVersion: v1
kind: Secret
metadata:
  name: ai-freelance-copilot-secrets
  labels:
    app: ai-freelance-copilot
type: Opaque
stringData:
  # Claude API key (required for live runs).
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  COPILOT_ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  # Storage (use a managed PostgreSQL DSN in production).
  COPILOT_DATABASE_URL: "postgresql+psycopg2://copilot:REPLACE_ME@postgres:5432/copilot"
  # SMTP credentials for the email digest.
  COPILOT_SMTP_HOST: "smtp.example.com"
  COPILOT_SMTP_USER: "copilot@example.com"
  COPILOT_SMTP_PASSWORD: "REPLACE_ME"
  COPILOT_SMTP_FROM: "copilot@example.com"
  COPILOT_NOTIFY_EMAIL_TO: "suryaanandan1995@gmail.com"
  # WhatsApp Business Cloud API (optional).
  COPILOT_WHATSAPP_TOKEN: ""
  COPILOT_WHATSAPP_PHONE_ID: ""
  COPILOT_WHATSAPP_TO: ""
