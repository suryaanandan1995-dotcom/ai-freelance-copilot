apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-freelance-copilot
  labels:
    app: ai-freelance-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-freelance-copilot
  template:
    metadata:
      labels:
        app: ai-freelance-copilot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: ghcr.io/suryaanandan1995-dotcom/ai-freelance-copilot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py", "dashboard", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-freelance-copilot-config
            - secretRef:
                name: ai-freelance-copilot-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
